<!DOCTYPE html>
<html>
<head>

<title>{{text.login}}</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.box{

background:white;
width:400px;
margin:auto;
margin-top:100px;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;

}

input{

width:90%;
padding:10px;
margin:10px;
}

button{

padding:10px 20px;
background:green;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="box">

<h2>{{text.login}}</h2>

<form method="POST">

<label>{{text.email}}</label>
<br>

<input type="email" name="email" required>

<br>

<label>{{text.password}}</label>
<br>

<input type="password" name="password" required>

<br><br>

<button type="submit">

{{text.login}}

</button>

</form>

<br>

<a href="/register">

{{text.register}}

</a>

</div>

</body>
</html>
