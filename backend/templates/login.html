<!DOCTYPE html>
<html>
<head>

<title>{{text.login}}</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    text-align:center;
}

.box{
    background:white;
    width:400px;
    margin:auto;
    margin-top:100px;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing: border-box;
}

button{
    padding:10px 20px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
}

/* Fix password box layout */
.password-box {
    position: relative;
    width: 100%;
}

.password-box input {
    width: 100%;
    padding-right: 40px; /* space for eye icon */
}

.toggle-password {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}

.toggle-password img {
    width: 20px; /* Smaller icon */
    opacity: 0.7;
}

.toggle-password img:hover {
    opacity: 1;
}

</style>

</head>

<body>

<div class="box">

<h2>{{text.login}}</h2>

<form method="POST">

<label>{{text.email}}</label>
<br>

<input type="email" name="email" required>

<br>

<label>{{text.password}}</label>
<br>

<div class="password-box">
    <input type="password" id="password" name="password" required>
    <span class="toggle-password" onclick="togglePassword()">
        <span id="eyeIcon">👁️</span>
    </span>
</div>

<br><br>

<button type="submit">

{{text.login}}

</button>

</form>

<br>

<a href="/register">

{{text.register}}

</a>

</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.textContent = "🙈";   // hide icon
    } else {
        passwordInput.type = "password";
        eyeIcon.textContent = "👁️";   // show icon
    }
}
</script>
</body>
</html>
